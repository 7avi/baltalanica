<div class="nav-host" [class.nav--scrolled]="scrolled()">
  <header class="nav" [class.nav--scrolled]="scrolled()">
    <div class="container nav__inner">
      <a href="#hero" class="brand" (click)="closeMenu()">
        <img src="/logo.png" alt="Balta cu Nuferi La Nica Logo" class="brand__logo">
        <span class="brand__text">
          <span class="brand__name">Balta cu Nuferi</span>
          <span class="brand__sub">La Nica</span>
        </span>
      </a>

      <button
        class="nav__burger"
        (click)="toggleMenu()"
        [class.is-open]="menuOpen()"
        [attr.aria-expanded]="menuOpen()"
        aria-controls="nav-menu"
        aria-label="Meniu"
      >
        <app-icon [name]="menuOpen() ? 'close' : 'menu'" [size]="26" />
      </button>
    </div>
  </header>

  <div
    class="nav__backdrop"
    [class.is-visible]="menuOpen()"
    (click)="closeMenu()"
    aria-hidden="true"
  ></div>

  <nav
    id="nav-menu"
    class="nav__links"
    [class.is-open]="menuOpen()"
    [attr.aria-hidden]="!menuOpen()"
  >
    @for (link of links; track link.href) {
      <a [href]="link.href" (click)="closeMenu()">{{ link.label }}</a>
    }
    <a class="nav__cta" href="#contact" (click)="closeMenu()">Rezervare</a>
  </nav>
</div>
